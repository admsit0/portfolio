
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adam - Data Science & Software Engineering Portfolio</title>
    <meta name="description" content="Portfolio of Adam, a 4th-year Data Science and Software Engineering student specializing in machine learning, web development, and data analysis." />
    <meta name="author" content="Adam" />
    <meta name="keywords" content="data science, software engineering, machine learning, web development, portfolio, student" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://adam-portfolio.com/" />
    <meta property="og:title" content="Adam - Data Science & Software Engineering Portfolio" />
    <meta property="og:description" content="Portfolio showcasing projects in machine learning, web development, and data analysis by Adam, a passionate Data Science student." />
    <meta property="og:image" content="https://adam-portfolio.com/portfolio-preview.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://adam-portfolio.com/" />
    <meta property="twitter:title" content="Adam - Data Science & Software Engineering Portfolio" />
    <meta property="twitter:description" content="Portfolio showcasing projects in machine learning, web development, and data analysis by Adam, a passionate Data Science student." />
    <meta property="twitter:image" content="https://adam-portfolio.com/portfolio-preview.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Additional meta for mobile optimization -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Adam Portfolio" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Adam",
      "jobTitle": "Data Science & Software Engineering Student",
      "description": "4th-year student specializing in machine learning, web development, and data analysis",
      "url": "https://adam-portfolio.com",
      "sameAs": [
        "https://github.com/adam",
        "https://linkedin.com/in/adam"
      ]
    }
    </script>
  </head>

  <body class="font-inter antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
